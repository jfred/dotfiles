# Starship prompt configuration
# Documentation: https://starship.rs/config/

# Timeout for commands (in milliseconds)
command_timeout = 500

# Format of the prompt - clean and simple
format = """
$directory\
$git_branch\
$git_status\
$git_state\
$line_break\
$character"""

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

[directory]
truncation_length = 2
truncate_to_repo = true
format = "[$path]($style) "
style = "bold cyan"

[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
style = "bold purple"
truncation_length = 25
truncation_symbol = ".."

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"
conflicted = "⚔️"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "\\$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bold dimmed white"

# Disable language version modules to reduce noise
[nodejs]
disabled = true

[python]
disabled = true

[package]
disabled = true

[java]
disabled = true

[golang]
disabled = true

[rust]
disabled = true

[elixir]
disabled = true

[docker_context]
disabled = true

[aws]
disabled = true

[kubernetes]
disabled = true
